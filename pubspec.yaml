name: piv_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core & UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.0

  # State Management & DI
  flutter_bloc: ^8.1.5
  get_it: ^7.7.0
  dartz: ^0.10.1

  # Auth
  google_sign_in: ^6.3.0
  # --- HẠ CẤP PACKAGE NÀY ĐỂ GIẢI QUYẾT XUNG ĐỘT ---
  flutter_facebook_auth: ^7.1.0

  # Helpers & Utilities
  shared_preferences: ^2.5.3
  uuid: ^4.4.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  carousel_slider: ^5.0.0

  # Image & QR Code
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  image_cropper: ^9.1.0

  cloud_functions: ^5.0.1
  flutter_inappwebview: ^6.0.0
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/